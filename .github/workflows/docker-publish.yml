# Build and publish the MinerWatch Docker image to GitHub Container Registry.
#
# Why this exists: the Umbrel Community App Store (and plain `docker compose
# pull`) install MinerWatch by *pulling* a prebuilt image — they don't build
# from source. The release.yml workflow only produces the source tarball +
# checksums for the bare-metal self-update flow; it never publishes an image.
# This workflow fills that gap.
#
# Triggers:
#   * pushing a version tag `vX.Y.Z` (same convention as release.yml) →
#     publishes ghcr.io/imlenti/minerwatch:X.Y.Z + :latest
#   * manual `workflow_dispatch` with an optional `version` input → lets us
#     publish an image for an *already-tagged* release (e.g. 1.6.0) without
#     cutting a new git tag. If left empty, the VERSION file is used.
#
# This workflow touches NOTHING in the bare-metal (macOS/Linux) path: it only
# builds the existing Dockerfile and pushes the resulting image. start.sh,
# installer.command and scripts/install-service.sh are untouched.

name: Publish Docker image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 1.6.0). Defaults to the VERSION file."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="$(tr -d '[:space:]' < VERSION)"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing image version: $VERSION"

      - name: Set up QEMU
        # Needed so the amd64 runner can build the arm64 image (Raspberry Pi).
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/imlenti/minerwatch:${{ steps.ver.outputs.version }}
            ghcr.io/imlenti/minerwatch:latest
          # Keep a plain image manifest (no provenance/SBOM attestation
          # sub-manifests). Some pull-based runtimes — including older Umbrel
          # tooling — get confused by the extra OCI manifests, so we stay
          # maximally compatible.
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
