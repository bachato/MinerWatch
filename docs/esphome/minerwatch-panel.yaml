# =============================================================================
# MinerWatch Panel — Guition JC3248W535C (ESP32-S3) — adaptive multi-miner UI
# =============================================================================
# Driven by ONE consolidated MQTT topic published by MinerWatch:
#   minerwatch/panel  ->  {"miners":[{id,name,ip,model,hr,pw,tp,on}, ...]}
# (added in backend/mqtt.py: panel_feed(); gated by mqtt.publish_flat_topics).
# The panel adapts automatically to however many miners you have (up to 16).
#
# UI:
#   * HOME = overview grid, 4 miners per screen, < > arrows to page between
#     groups of 4. Tap a miner card -> that miner full screen.
#   * DETAIL (full screen) = name + IP (top-left), ONLINE/OFFLINE (top-right,
#     green/red), and hashrate / chip-temp arcs + power. < > on the edges go to
#     the previous/next miner; a tap ANYWHERE else returns to the overview.
#
# Hardware/driver verbatim from working JC3248W535C configs (mipi_spi model
# JC3248W535 auto-sets cs/reset/dimensions/init). Needs ESPHome >= 2025.11.
# secrets.yaml must define wifi_ssid / wifi_password.
# =============================================================================

esphome:
  name: minerwatch-panel
  friendly_name: MinerWatch Panel
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "MinerWatch Panel Fallback"

captive_portal:

# =============================================================================
# MQTT — single consolidated feed drives the whole UI.
# =============================================================================
mqtt:
  broker: 192.168.1.10
  on_json_message:
    - topic: minerwatch/panel
      then:
        - lambda: |-
            int n = 0;
            for (auto v : x["miners"].as<JsonArrayConst>()) {
              if (n >= 16) break;
              auto m = v.as<JsonObjectConst>();
              id(g_name)[n] = std::string(m["name"] | "");
              id(g_ip)[n]   = std::string(m["ip"]   | "");
              id(g_hr)[n]   = m["hr"] | 0.0f;
              id(g_pw)[n]   = m["pw"] | 0.0f;
              id(g_tp)[n]   = m["tp"] | 0.0f;
              id(g_on)[n]   = m["on"] | false;
              n++;
            }
            id(g_count) = n;
            if (n == 0) { id(g_cur) = 0; }
            else if (id(g_cur) >= n) { id(g_cur) = n - 1; }
        - script.execute: refresh_view

# =============================================================================
# State: up to 16 miners, current detail index, current overview page.
# =============================================================================
globals:
  - id: g_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_cur
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_ovpage
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_name
    type: std::array<std::string, 16>
    restore_value: no
  - id: g_ip
    type: std::array<std::string, 16>
    restore_value: no
  - id: g_hr
    type: float[16]
    restore_value: no
  - id: g_pw
    type: float[16]
    restore_value: no
  - id: g_tp
    type: float[16]
    restore_value: no
  - id: g_on
    type: bool[16]
    restore_value: no

# =============================================================================
# Buses + backlight + display + touch (board-specific, proven).
# =============================================================================
spi:
  - id: qspi_bus
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - id: touch_bus
    sda: 4
    scl: 8

output:
  - platform: ledc
    id: backlight_output
    pin: 1

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_spi
    id: main_display
    model: JC3248W535
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false
    # rotation lives in lvgl: (LVGL rotates screen + touch together)

touchscreen:
  - platform: axs15231
    id: main_touch
    display: main_display
    i2c_id: touch_bus
    # If taps land mirrored on your panel, add e.g. transform: { mirror_x: true }

# =============================================================================
# Repaint: rebuilds both views from globals. Called after every feed update
# and after navigation. Uses LVGL C calls so we can index miners dynamically.
# =============================================================================
script:
  - id: refresh_view
    then:
      - lambda: |-
          char buf[28];
          int n = id(g_count);

          // ---------------- DETAIL (single miner) ----------------
          if (n == 0) {
            lv_label_set_text(id(d_name), "Waiting for data");
            lv_label_set_text(id(d_ip), "");
            lv_label_set_text(id(d_status), "");
            lv_label_set_text(id(d_hr), "--");
            lv_label_set_text(id(d_tp), "--");
            lv_label_set_text(id(d_pw), "-- W");
            lv_arc_set_value(id(d_arc_hr), 0);
            lv_arc_set_value(id(d_arc_tp), 0);
          } else {
            int i = id(g_cur);
            if (i < 0) i = 0;
            if (i >= n) i = n - 1;
            lv_label_set_text(id(d_name), id(g_name)[i].c_str());
            lv_label_set_text(id(d_ip), id(g_ip)[i].c_str());
            snprintf(buf, sizeof(buf), "%.1f", id(g_hr)[i]);
            lv_label_set_text(id(d_hr), buf);
            snprintf(buf, sizeof(buf), "%.0f", id(g_tp)[i]);
            lv_label_set_text(id(d_tp), buf);
            snprintf(buf, sizeof(buf), "%.0f W", id(g_pw)[i]);
            lv_label_set_text(id(d_pw), buf);
            lv_arc_set_value(id(d_arc_hr), (int) (id(g_hr)[i] * 10.0f));
            lv_arc_set_value(id(d_arc_tp), (int) (id(g_tp)[i]));
            if (id(g_on)[i]) {
              lv_label_set_text(id(d_status), "ONLINE");
              lv_obj_set_style_text_color(id(d_status), lv_color_hex(0x33D17A), 0);
            } else {
              lv_label_set_text(id(d_status), "OFFLINE");
              lv_obj_set_style_text_color(id(d_status), lv_color_hex(0xE01B24), 0);
            }
          }
          // detail prev/next arrows only matter with >1 miner
          if (n > 1) {
            lv_obj_clear_flag(id(d_prev), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(d_next), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(d_prev), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(d_next), LV_OBJ_FLAG_HIDDEN);
          }

          // ---------------- OVERVIEW (grid of 4) ----------------
          int pages = (n + 3) / 4;
          if (pages < 1) pages = 1;
          int op = id(g_ovpage);
          if (op < 0) op = 0;
          if (op >= pages) op = pages - 1;
          id(g_ovpage) = op;
          int start = op * 4;

          if (n == 0) lv_obj_clear_flag(id(ov_empty), LV_OBJ_FLAG_HIDDEN);
          else        lv_obj_add_flag(id(ov_empty), LV_OBJ_FLAG_HIDDEN);

          snprintf(buf, sizeof(buf), "%d/%d", op + 1, pages);
          lv_label_set_text(id(ov_page), buf);
          if (pages > 1) {
            lv_obj_clear_flag(id(ov_prev), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(ov_next), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(ov_prev), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(ov_next), LV_OBJ_FLAG_HIDDEN);
          }

          // Card 0
          { int k = start + 0;
            if (k < n) {
              lv_obj_clear_flag(id(ov_card0), LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(id(ov_name0), id(g_name)[k].c_str());
              snprintf(buf, sizeof(buf), "%.1f TH/s", id(g_hr)[k]);
              lv_label_set_text(id(ov_hr0), buf);
              snprintf(buf, sizeof(buf), "%.0f C", id(g_tp)[k]);
              lv_label_set_text(id(ov_tp0), buf);
              lv_obj_set_style_bg_color(id(ov_dot0), id(g_on)[k] ? lv_color_hex(0x33D17A) : lv_color_hex(0xE01B24), 0);
            } else { lv_obj_add_flag(id(ov_card0), LV_OBJ_FLAG_HIDDEN); }
          }
          // Card 1
          { int k = start + 1;
            if (k < n) {
              lv_obj_clear_flag(id(ov_card1), LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(id(ov_name1), id(g_name)[k].c_str());
              snprintf(buf, sizeof(buf), "%.1f TH/s", id(g_hr)[k]);
              lv_label_set_text(id(ov_hr1), buf);
              snprintf(buf, sizeof(buf), "%.0f C", id(g_tp)[k]);
              lv_label_set_text(id(ov_tp1), buf);
              lv_obj_set_style_bg_color(id(ov_dot1), id(g_on)[k] ? lv_color_hex(0x33D17A) : lv_color_hex(0xE01B24), 0);
            } else { lv_obj_add_flag(id(ov_card1), LV_OBJ_FLAG_HIDDEN); }
          }
          // Card 2
          { int k = start + 2;
            if (k < n) {
              lv_obj_clear_flag(id(ov_card2), LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(id(ov_name2), id(g_name)[k].c_str());
              snprintf(buf, sizeof(buf), "%.1f TH/s", id(g_hr)[k]);
              lv_label_set_text(id(ov_hr2), buf);
              snprintf(buf, sizeof(buf), "%.0f C", id(g_tp)[k]);
              lv_label_set_text(id(ov_tp2), buf);
              lv_obj_set_style_bg_color(id(ov_dot2), id(g_on)[k] ? lv_color_hex(0x33D17A) : lv_color_hex(0xE01B24), 0);
            } else { lv_obj_add_flag(id(ov_card2), LV_OBJ_FLAG_HIDDEN); }
          }
          // Card 3
          { int k = start + 3;
            if (k < n) {
              lv_obj_clear_flag(id(ov_card3), LV_OBJ_FLAG_HIDDEN);
              lv_label_set_text(id(ov_name3), id(g_name)[k].c_str());
              snprintf(buf, sizeof(buf), "%.1f TH/s", id(g_hr)[k]);
              lv_label_set_text(id(ov_hr3), buf);
              snprintf(buf, sizeof(buf), "%.0f C", id(g_tp)[k]);
              lv_label_set_text(id(ov_tp3), buf);
              lv_obj_set_style_bg_color(id(ov_dot3), id(g_on)[k] ? lv_color_hex(0x33D17A) : lv_color_hex(0xE01B24), 0);
            } else { lv_obj_add_flag(id(ov_card3), LV_OBJ_FLAG_HIDDEN); }
          }

# =============================================================================
# LVGL — page 1 = overview (home), page 2 = detail.
# =============================================================================
lvgl:
  rotation: 90              # landscape 480x320 — rotates display AND touch
  buffer_size: 25%
  default_font: montserrat_14
  pages:

    # ---------------------------------------------------------------- OVERVIEW
    - id: overview_page
      bg_color: 0x0F1419
      bg_opa: COVER
      widgets:
        - label:
            align: TOP_LEFT
            x: 12
            y: 7
            text_font: montserrat_18
            text_color: 0x4DD0C4
            text: "MINERWATCH"

        - label:
            id: ov_empty
            align: CENTER
            text_font: montserrat_18
            text_color: 0x9AA0A6
            text: "Waiting for data"
            hidden: true

        # 2x2 cards (filled / hidden at runtime)
        - button:
            id: ov_card0
            x: 12
            y: 32
            width: 224
            height: 112
            bg_color: 0x1A1F26
            radius: 10
            border_width: 0
            hidden: true
            widgets:
              - label: { id: ov_name0, align: TOP_LEFT, x: 10, y: 8, text_font: montserrat_16, text_color: 0xFFFFFF, text: "-" }
              - obj:   { id: ov_dot0, align: TOP_RIGHT, x: -10, y: 10, width: 14, height: 14, radius: 7, bg_opa: COVER, bg_color: 0x9AA0A6, border_width: 0 }
              - label: { id: ov_hr0, align: LEFT_MID, x: 10, y: 4, text_font: montserrat_22, text_color: 0xFFFFFF, text: "-" }
              - label: { id: ov_tp0, align: BOTTOM_LEFT, x: 10, y: -8, text_font: montserrat_14, text_color: 0x9AA0A6, text: "-" }
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  int op = id(g_ovpage); if (op >= pages) op = pages - 1; if (op < 0) op = 0;
                  int k = op * 4 + 0;
                  if (k < id(g_count)) id(g_cur) = k;
              - lvgl.page.show: detail_page
              - script.execute: refresh_view

        - button:
            id: ov_card1
            x: 244
            y: 32
            width: 224
            height: 112
            bg_color: 0x1A1F26
            radius: 10
            border_width: 0
            hidden: true
            widgets:
              - label: { id: ov_name1, align: TOP_LEFT, x: 10, y: 8, text_font: montserrat_16, text_color: 0xFFFFFF, text: "-" }
              - obj:   { id: ov_dot1, align: TOP_RIGHT, x: -10, y: 10, width: 14, height: 14, radius: 7, bg_opa: COVER, bg_color: 0x9AA0A6, border_width: 0 }
              - label: { id: ov_hr1, align: LEFT_MID, x: 10, y: 4, text_font: montserrat_22, text_color: 0xFFFFFF, text: "-" }
              - label: { id: ov_tp1, align: BOTTOM_LEFT, x: 10, y: -8, text_font: montserrat_14, text_color: 0x9AA0A6, text: "-" }
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  int op = id(g_ovpage); if (op >= pages) op = pages - 1; if (op < 0) op = 0;
                  int k = op * 4 + 1;
                  if (k < id(g_count)) id(g_cur) = k;
              - lvgl.page.show: detail_page
              - script.execute: refresh_view

        - button:
            id: ov_card2
            x: 12
            y: 150
            width: 224
            height: 112
            bg_color: 0x1A1F26
            radius: 10
            border_width: 0
            hidden: true
            widgets:
              - label: { id: ov_name2, align: TOP_LEFT, x: 10, y: 8, text_font: montserrat_16, text_color: 0xFFFFFF, text: "-" }
              - obj:   { id: ov_dot2, align: TOP_RIGHT, x: -10, y: 10, width: 14, height: 14, radius: 7, bg_opa: COVER, bg_color: 0x9AA0A6, border_width: 0 }
              - label: { id: ov_hr2, align: LEFT_MID, x: 10, y: 4, text_font: montserrat_22, text_color: 0xFFFFFF, text: "-" }
              - label: { id: ov_tp2, align: BOTTOM_LEFT, x: 10, y: -8, text_font: montserrat_14, text_color: 0x9AA0A6, text: "-" }
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  int op = id(g_ovpage); if (op >= pages) op = pages - 1; if (op < 0) op = 0;
                  int k = op * 4 + 2;
                  if (k < id(g_count)) id(g_cur) = k;
              - lvgl.page.show: detail_page
              - script.execute: refresh_view

        - button:
            id: ov_card3
            x: 244
            y: 150
            width: 224
            height: 112
            bg_color: 0x1A1F26
            radius: 10
            border_width: 0
            hidden: true
            widgets:
              - label: { id: ov_name3, align: TOP_LEFT, x: 10, y: 8, text_font: montserrat_16, text_color: 0xFFFFFF, text: "-" }
              - obj:   { id: ov_dot3, align: TOP_RIGHT, x: -10, y: 10, width: 14, height: 14, radius: 7, bg_opa: COVER, bg_color: 0x9AA0A6, border_width: 0 }
              - label: { id: ov_hr3, align: LEFT_MID, x: 10, y: 4, text_font: montserrat_22, text_color: 0xFFFFFF, text: "-" }
              - label: { id: ov_tp3, align: BOTTOM_LEFT, x: 10, y: -8, text_font: montserrat_14, text_color: 0x9AA0A6, text: "-" }
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  int op = id(g_ovpage); if (op >= pages) op = pages - 1; if (op < 0) op = 0;
                  int k = op * 4 + 3;
                  if (k < id(g_count)) id(g_cur) = k;
              - lvgl.page.show: detail_page
              - script.execute: refresh_view

        # paging arrows (hidden when only one page)
        - button:
            id: ov_prev
            align: BOTTOM_LEFT
            x: 12
            y: -6
            width: 44
            height: 44
            bg_color: 0x2A2E37
            radius: 8
            border_width: 0
            hidden: true
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_28
                  text_color: 0xFFFFFF
                  text: "<"
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  id(g_ovpage) = (id(g_ovpage) - 1 + pages) % pages;
              - script.execute: refresh_view
        - label:
            id: ov_page
            align: BOTTOM_MID
            y: -16
            text_font: montserrat_16
            text_color: 0x9AA0A6
            text: "1/1"
        - button:
            id: ov_next
            align: BOTTOM_RIGHT
            x: -12
            y: -6
            width: 44
            height: 44
            bg_color: 0x2A2E37
            radius: 8
            border_width: 0
            hidden: true
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_28
                  text_color: 0xFFFFFF
                  text: ">"
            on_release:
              - lambda: |-
                  int pages = (id(g_count) + 3) / 4; if (pages < 1) pages = 1;
                  id(g_ovpage) = (id(g_ovpage) + 1) % pages;
              - script.execute: refresh_view

    # ------------------------------------------------------------------ DETAIL
    - id: detail_page
      bg_color: 0x0F1419
      bg_opa: COVER
      widgets:
        # Full-screen catcher: a tap anywhere that isn't an arrow -> overview.
        - button:
            id: d_bg
            x: 0
            y: 0
            width: 480
            height: 320
            bg_opa: TRANSP
            border_width: 0
            radius: 0
            shadow_width: 0
            on_release:
              - lvgl.page.show: overview_page
              - script.execute: refresh_view

        # Header (clickable:false so taps fall through to d_bg -> back)
        - label:
            id: d_name
            align: TOP_LEFT
            x: 12
            y: 8
            text_font: montserrat_22
            text_color: 0xFFFFFF
            clickable: false
            text: "-"
        - label:
            id: d_ip
            align: TOP_LEFT
            x: 12
            y: 38
            text_font: montserrat_14
            text_color: 0x9AA0A6
            clickable: false
            text: "-"
        - label:
            id: d_status
            align: TOP_RIGHT
            x: -12
            y: 14
            text_font: montserrat_18
            text_color: 0x9AA0A6
            clickable: false
            text: "-"

        # Hashrate arc
        - arc:
            id: d_arc_hr
            align: LEFT_MID
            x: 54
            y: 12
            width: 168
            height: 168
            clickable: false
            min_value: 0
            max_value: 100
            value: 0
            arc_width: 14
            arc_color: 0x2A2E37
            indicator:
              arc_color: 0x33D17A
              arc_width: 14
            widgets:
              - label: { align: CENTER, y: -44, text_font: montserrat_14, text_color: 0x9AA0A6, text: "HASHRATE" }
              - label: { id: d_hr, align: CENTER, y: -4, text_font: montserrat_34, text_color: 0xFFFFFF, text: "-" }
              - label: { align: CENTER, y: 30, text_font: montserrat_14, text_color: 0x9AA0A6, text: "TH/s" }

        # Chip-temp arc
        - arc:
            id: d_arc_tp
            align: RIGHT_MID
            x: -54
            y: 12
            width: 168
            height: 168
            clickable: false
            min_value: 0
            max_value: 100
            value: 0
            arc_width: 14
            arc_color: 0x2A2E37
            indicator:
              arc_color: 0xE8A33D
              arc_width: 14
            widgets:
              - label: { align: CENTER, y: -44, text_font: montserrat_14, text_color: 0x9AA0A6, text: "CHIP TEMP" }
              - label: { id: d_tp, align: CENTER, y: -4, text_font: montserrat_34, text_color: 0xFFFFFF, text: "-" }
              - label: { align: CENTER, y: 30, text_font: montserrat_14, text_color: 0x9AA0A6, text: "C" }

        # Power readout
        - label:
            align: BOTTOM_MID
            y: -38
            text_font: montserrat_14
            text_color: 0x9AA0A6
            clickable: false
            text: "POWER"
        - label:
            id: d_pw
            align: BOTTOM_MID
            y: -10
            text_font: montserrat_22
            text_color: 0xFFFFFF
            clickable: false
            text: "- W"

        # Prev/next miner arrows (on top, clickable; don't trigger the back tap)
        - button:
            id: d_prev
            align: LEFT_MID
            x: 6
            width: 42
            height: 64
            bg_color: 0x2A2E37
            radius: 8
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_28
                  text_color: 0xFFFFFF
                  text: "<"
            on_release:
              - lambda: |-
                  if (id(g_count) > 1)
                    id(g_cur) = (id(g_cur) - 1 + id(g_count)) % id(g_count);
              - script.execute: refresh_view
        - button:
            id: d_next
            align: RIGHT_MID
            x: -6
            width: 42
            height: 64
            bg_color: 0x2A2E37
            radius: 8
            border_width: 0
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_28
                  text_color: 0xFFFFFF
                  text: ">"
            on_release:
              - lambda: |-
                  if (id(g_count) > 1)
                    id(g_cur) = (id(g_cur) + 1) % id(g_count);
              - script.execute: refresh_view

# =============================================================================
# Notes
# -----------------------------------------------------------------------------
# * Names/IPs come from MinerWatch (panel_feed in backend/mqtt.py). Enable
#   mqtt.publish_flat_topics for the feed to be published.
# * Fonts are built-in Montserrat (ASCII only), so temp shows "62 C". To get a
#   degree glyph, swap to a gfonts font with the ° glyph (needs build-host net).
